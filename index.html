<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ugadi 2026 | Savithramma's Family</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --mango-green: #2e7d32;
            --marigold-orange: #ff9800;
            --turmeric-yellow: #ffc107;
            --warm-white: #fffdf5;
            --deep-red: #b71c1c;
            --leaf-gradient: linear-gradient(135deg, #2e7d32, #4caf50);
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--warm-white);
            color: #444;
            overflow-x: hidden;
        }

        /* --- 1. HERO IMAGE SECTION (Top Box) --- */
        .hero-image {
            height: 60vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.4)), 
                        url('family.jpeg') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 60px;
            border-bottom: 8px solid var(--marigold-orange);
        }

        .hero-image h1 {
            color: white;
            font-family: 'Lora', serif;
            font-size: clamp(2rem, 7vw, 4rem);
            text-shadow: 0 4px 15px rgba(0,0,0,0.6);
            margin: 0;
            animation: glow 2s ease-in-out infinite alternate;
        }

        /* --- 2. VERTICAL CELLS SECTION (Bottom Box) --- */
        .info-container {
            max-width: 600px;
            margin: -40px auto 50px; /* Overlaps image slightly like the sketch */
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column; /* Vertical alignment */
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .cell {
            padding: 25px 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .cell:last-child { border-bottom: none; }

        .date-cell { font-weight: 600; color: var(--deep-red); font-size: 1.2rem; }
        .venue-cell { background-color: #f9fff9; color: var(--mango-green); font-weight: 600; }
        .quote-cell { font-style: italic; color: #666; font-size: 1rem; line-height: 1.8; }

        /* --- 3. ANIMATED SEAL (Floating Circle) --- */
        .animated-seal {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 90px;
            height: 90px;
            background: radial-gradient(circle, var(--turmeric-yellow), var(--marigold-orange), var(--deep-red));
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: rotateSeal 12s linear infinite;
            z-index: 100;
            padding: 5px;
        }

        /* Animations */
        @keyframes rotateSeal { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes glow { from { text-shadow: 0 0 10px #fff; } to { text-shadow: 0 0 20px var(--turmeric-yellow); } }

        /* Decorative Toran */
        .toran { position: absolute; top: 0; width: 100%; display: flex; justify-content: space-around; pointer-events: none; }
        .leaf { width: 25px; height: 60px; background: var(--leaf-gradient); border-radius: 0 100% 35% 65% / 0 65% 35% 100%; transform-origin: top center; animation: sway 3s infinite alternate; }
        @keyframes sway { 0% { transform: rotate(-5deg); } 100% { transform: rotate(5deg); } }

        footer { background: var(--mango-green); color: white; padding: 30px; text-align: center; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="toran">
        <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
        <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
    </div>

    <header class="hero-image">
        <h1>ఉగాది శుభాకాంక్షలు</h1>
    </header>

    <main class="info-container">
        <div class="cell date-cell">
            మార్చి 20, 2026 (రేపు)
        </div>
        
        <div class="cell venue-cell">
            వేదిక: బేతంపూడి గ్రామం
        </div>

        <div class="cell quote-cell">
            మన మూలాలను, మన కుటుంబాన్ని, మరియు నూతన సంవత్సరపు రుచులను కలిసి జరుపుకోవడానికి బెతంపూడిలో సమావేశమవుదాం.
        </div>
    </main>

    <div class="animated-seal">
        శ్రీ పరాభవ నామ<br>ఉగాది<br>2026
    </div>

    <footer>
        Savithramma Family Gathering | Bethampudi
    </footer>

</body>
</html>
